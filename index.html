<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wasm RAR to ZIP Converter</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      #drop-zone {
        width: 90vw;
        max-width: 800px;
        height: 70vh;
        border: 3px dashed #38bdf8;
        border-radius: 24px;
        background-color: #1e293b;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        padding: 40px;
        box-sizing: border-box;
        text-align: center;
      }

      #drop-zone.hover {
        border-color: #4ade80;
        background-color: #334155;
        transform: scale(1.015);
      }

      #drop-zone p {
        font-size: 1.5rem;
        margin: 0 0 10px 0;
        pointer-events: none;
      }

      #drop-zone span {
        font-size: 1rem;
        color: #94a3b8;
        pointer-events: none;
      }

      #file-input {
        display: none;
      }

      .status {
        margin-top: 25px;
        font-size: 1.1rem;
        font-weight: 500;
      }

      .error {
        color: #f87171;
      }
      .success {
        color: #4ade80;
      }
      .processing {
        color: #f59e0b;
      }
    </style>
  </head>
  <body>
    <div id="drop-zone">
      <p>Drag & drop your <strong>.rar</strong> archive here</p>
      <span>or click anywhere inside this box to browse</span>
      <div id="status" class="status"></div>
      <input type="file" id="file-input" accept=".rar" />
    </div>

    <script type="module">
      // Import our Wasm package compiled using target=web
      import init, { convert_rar_to_zip } from "./pkg/rar_to_zip.js";

      async function start() {
        // Load and instantiate the Wasm binary
        await init();

        const dropZone = document.getElementById("drop-zone");
        const fileInput = document.getElementById("file-input");
        const status = document.getElementById("status");

        // Open OS file dialog on click
        dropZone.addEventListener("click", () => fileInput.click());
        fileInput.addEventListener("change", (e) =>
          processFiles(e.target.files),
        );

        // Visual drag-and-drop feedback loops
        ["dragenter", "dragover"].forEach((name) => {
          dropZone.addEventListener(
            name,
            (e) => {
              e.preventDefault();
              dropZone.classList.add("hover");
            },
            false,
          );
        });

        ["dragleave", "drop"].forEach((name) => {
          dropZone.addEventListener(
            name,
            (e) => {
              e.preventDefault();
              dropZone.classList.remove("hover");
            },
            false,
          );
        });

        dropZone.addEventListener("drop", (e) => {
          processFiles(e.dataTransfer.files);
        });

        async function processFiles(files) {
          if (files.length === 0) return;
          const file = files[0];

          if (!file.name.toLowerCase().endsWith(".rar")) {
            updateStatus("Error: Only .rar files are accepted.", "error");
            return;
          }

          updateStatus(
            "Processing archive inside WebAssembly...",
            "processing",
          );

          try {
            // Extract file bytes into Wasm-friendly typed arrays
            const arrayBuffer = await file.arrayBuffer();
            const uint8Array = new Uint8Array(arrayBuffer);

            // Execute conversion natively in Rust via Wasm
            const zipBytes = convert_rar_to_zip(uint8Array);

            // Create an auto-triggered download blob link
            const blob = new Blob([zipBytes], { type: "application/zip" });
            const downloadUrl = URL.createObjectURL(blob);

            const triggerLink = document.createElement("a");
            triggerLink.href = downloadUrl;
            triggerLink.download = file.name.replace(/\.rar$/i, ".zip");
            document.body.appendChild(triggerLink);
            triggerLink.click();
            document.body.removeChild(triggerLink);

            updateStatus("Conversion successful! Download started.", "success");
          } catch (err) {
            updateStatus("Conversion Failed: " + err, "error");
          }
        }

        function updateStatus(text, typeClass) {
          status.textContent = text;
          status.className = "status " + typeClass;
        }
      }

      start();
    </script>
  </body>
</html>
